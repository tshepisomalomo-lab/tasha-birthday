<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Tasha ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Playfair Display', serif; }
        .hero-bg { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); }
        video { width: 100%; display: block; border-radius: 20px; }
    </style>
</head>
<body class="bg-[#fff0f5] text-[#2d2d2d] overflow-x-hidden">

    <!-- HERO -->
    <section class="hero-bg min-h-screen flex items-center justify-center px-6 py-12">
        <div class="max-w-md mx-auto text-center">
            <div class="text-7xl mb-6">🎂</div>
            <h1 class="title-font text-6xl font-bold text-pink-600 tracking-tighter">HAPPY BIRTHDAY</h1>
            <h2 class="title-font text-6xl font-bold text-pink-700 mt-3">Tasha</h2>
            <p class="mt-10 text-lg text-pink-700">From the guy who still thinks you're the most amazing girl in the world ❤️</p>
        </div>
    </section>

    <!-- MEMORY LANE -->
    <section class="max-w-md mx-auto px-6 py-12 bg-white">
        <h3 class="text-pink-600 text-sm font-medium tracking-widest mb-6 text-center">OUR LITTLE MEMORY LANE</h3>
        
        <div class="flex gap-6 overflow-x-auto pb-8 snap-x snap-mandatory">
            <!-- Photo 1 -->
            <div class="min-w-[260px] snap-center bg-white rounded-3xl overflow-hidden shadow-sm">
                <img src="images/tasha1.jpeg" alt="Memory 1" class="w-full h-56 object-cover">
                <div class="p-4 text-center text-xs text-pink-700">Our first pic</div>
            </div>

            <!-- Video -->
            <div class="min-w-[260px] snap-center bg-white rounded-3xl overflow-hidden shadow-sm">
                <video id="danceVideo" loop playsinline controls class="w-full h-56 object-cover">
                    <source src="https://raw.githack.com/tshepisomalomo-lab/tasha-birthday/main/images/tasha2.mp4" type="video/mp4">
                </video>
                <div class="p-4 text-center text-xs text-pink-700">Abo o gana go ja 💃</div>
            </div>

            <!-- Photo 3 -->
            <div class="min-w-[260px] snap-center bg-white rounded-3xl overflow-hidden shadow-sm">
                <img src="images/tasha3.jpeg" alt="Memory 3" class="w-full h-56 object-cover">
                <div class="p-4 text-center text-xs text-pink-700">Ya practice ne e chaile</div>
            </div>
        </div>
    </section>

    <!-- Wish Button -->
    <section class="max-w-md mx-auto px-6 py-16 bg-white text-center">
        <div class="text-8xl mb-6">🕯️</div>
        <p class="text-pink-600 text-xl font-medium mb-8">Make a wish...</p>
        <button onclick="makeWish()" 
                class="w-full bg-gradient-to-r from-pink-500 to-rose-500 text-white py-6 rounded-3xl text-lg font-semibold shadow-lg active:scale-95">
            TAP TO MAKE YOUR WISH ✨
        </button>
        <div id="wish-result" class="mt-8 text-sm text-pink-700 hidden">
            Wish granted in the universe ❤️
        </div>
    </section>

    <script>
        // Enable video sound after tap
        document.addEventListener('click', () => {
            const video = document.getElementById('danceVideo');
            if (video) video.play().catch(() => {});
        }, { once: true });

        function makeWish() {
            document.getElementById('wish-result').classList.remove('hidden');
        }
    </script>
</body>
</html>
